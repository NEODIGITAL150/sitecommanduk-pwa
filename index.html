<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1F6FBF" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>SiteCommand UK</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #3FA9F5;
      --blue-dark: #1F6FBF;
      --yellow: #FFD700;
      --dark: #1A1A1A;
      --bg: #F4F6F8;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Montserrat', sans-serif;
      color: var(--dark);
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      height: 100vh;
      padding: 28px 24px 40px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .shield-logo {
      width: 38px;
      height: 38px;
    }

    .brand-name {
      font-size: 21px;
      font-weight: 900;
      color: var(--blue-dark);
      letter-spacing: -0.5px;
    }

    .brand-name span {
      color: var(--blue);
    }

    .tagline {
      font-size: 10px;
      font-weight: 700;
      color: #aaa;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── MASCOT ── */
    .mascot-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .mascot {
      width: 170px;
      height: 170px;
      position: relative;
    }

    .mascot svg {
      width: 100%;
      height: 100%;
      transition: filter 0.4s;
      filter: drop-shadow(0 8px 20px rgba(63, 169, 245, 0.2));
    }

    /* Animated SVG elements */
    #eyeL,
    #eyeR {
      transition: ry 0.3s ease, fill 0.3s ease;
    }

    #smilePath {
      transition: d 0.3s ease;
    }

    .wave-line {
      opacity: 0;
      transition: opacity 0.3s;
    }

    .stress-line {
      opacity: 0;
      transition: opacity 0.3s;
    }

    .question-mark {
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* ── STATE ANIMATIONS ── */

    /* LISTENING */
    .state-listening .mascot svg {
      filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
      animation: mascot-breathe 1s ease-in-out infinite;
    }

    @keyframes mascot-breathe {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.04);
      }
    }

    /* THINKING */
    .state-thinking .mascot svg {
      animation: mascot-bob 1.2s ease-in-out infinite;
    }

    .state-thinking .stress-line {
      opacity: 1;
      animation: stress-flicker 0.4s infinite alternate;
    }

    @keyframes mascot-bob {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-5px)
      }
    }

    @keyframes stress-flicker {
      from {
        opacity: 0.5
      }

      to {
        opacity: 1
      }
    }

    /* SPEAKING */
    .state-speaking .mascot svg {
      animation: mascot-speak 0.45s ease-in-out infinite alternate;
    }

    .state-speaking .wave-line {
      opacity: 1;
      animation: wave-bounce 0.5s ease-in-out infinite alternate;
    }

    @keyframes mascot-speak {
      from {
        transform: translateY(0)
      }

      to {
        transform: translateY(-4px)
      }
    }

    @keyframes wave-bounce {
      from {
        transform: scaleY(0.6)
      }

      to {
        transform: scaleY(1)
      }
    }

    /* SUCCESS */
    .state-success .mascot svg {
      filter: drop-shadow(0 0 24px rgba(34, 197, 94, 0.6));
      animation: success-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .state-success .wave-line {
      opacity: 1;
    }

    @keyframes success-pop {
      0% {
        transform: scale(0.92)
      }

      100% {
        transform: scale(1)
      }
    }

    /* ERROR */
    .state-error .mascot svg {
      filter: drop-shadow(0 0 24px rgba(239, 68, 68, 0.5));
      animation: error-shake 0.4s ease-in-out;
    }

    .state-error .question-mark {
      opacity: 1;
      animation: q-float 1s ease-in-out infinite alternate;
    }

    @keyframes error-shake {

      0%,
      100% {
        transform: translateX(0)
      }

      25% {
        transform: translateX(-6px)
      }

      75% {
        transform: translateX(6px)
      }
    }

    @keyframes q-float {
      from {
        transform: translateY(0)
      }

      to {
        transform: translateY(-5px)
      }
    }

    /* ── STATUS BADGE ── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      border-radius: 999px;
      padding: 7px 18px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      transition: all 0.3s;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      transition: background 0.3s;
    }

    .state-idle .status-dot {
      background: #ccc;
    }

    .state-listening .status-dot {
      background: var(--yellow);
      animation: blink 0.6s infinite;
    }

    .state-thinking .status-dot {
      background: var(--blue);
      animation: blink 0.8s infinite;
    }

    .state-speaking .status-dot {
      background: #a855f7;
      animation: blink 0.5s infinite;
    }

    .state-success .status-dot {
      background: #22c55e;
    }

    .state-error .status-dot {
      background: #ef4444;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.15
      }
    }

    .response-text {
      font-size: 15px;
      font-weight: 700;
      color: var(--dark);
      text-align: center;
      max-width: 300px;
      min-height: 40px;
      line-height: 1.4;
    }

    /* ── BUTTON ── */
    .btn-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .ptt-btn {
      width: 196px;
      height: 196px;
      border-radius: 50%;
      background: var(--blue-dark);
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 8px 32px rgba(31, 111, 191, 0.4);
      transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
      touch-action: none;
    }

    .ptt-btn:active {
      transform: scale(0.95);
    }

    .state-listening .ptt-btn {
      background: var(--blue);
      animation: btn-pulse 1.1s ease-out infinite;
    }

    @keyframes btn-pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.5), 0 8px 32px rgba(63, 169, 245, 0.5);
      }

      70% {
        box-shadow: 0 0 0 28px rgba(255, 215, 0, 0), 0 8px 32px rgba(63, 169, 245, 0.5);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(255, 215, 0, 0), 0 8px 32px rgba(63, 169, 245, 0.5);
      }
    }

    .state-thinking .ptt-btn {
      background: var(--blue-dark);
      opacity: 0.75;
      cursor: not-allowed;
    }

    .state-speaking .ptt-btn {
      background: #7c3aed;
    }

    .state-success .ptt-btn {
      background: #16a34a;
    }

    .state-error .ptt-btn {
      background: #dc2626;
    }

    .btn-icon {
      font-size: 50px;
      line-height: 1;
    }

    .btn-label {
      font-size: 11px;
      font-weight: 800;
      color: white;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .hold-hint {
      font-size: 11px;
      font-weight: 600;
      color: #bbb;
      letter-spacing: 0.3px;
    }

    .hw-hint {
      font-size: 10px;
      font-weight: 600;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .hw-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--yellow);
    }

    /* ── FOOTER ── */
    .footer {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    .footer-brand {
      font-size: 11px;
      font-weight: 700;
      color: #bbb;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .footer-version {
      font-size: 10px;
      color: #ccc;
    }
  </style>
</head>

  <script>
  const N8N_WEBHOOK_URL = 'https://sitecommanduk.app.n8n.cloud/webhook/sitebot-voice-command';
const TENANT_ID = 'rec9p6w2uNFmbmpFD';
let currentSessionId = null;

const app = document.getElementById('app');
const pttBtn = document.getElementById('pttBtn');
const statusText = document.getElementById('statusText');
const responseText = document.getElementById('responseText');
const btnIcon = document.getElementById('btnIcon');
const btnLabel = document.getElementById('btnLabel');
const holdHint = document.getElementById('holdHint');

const STATES = {
  idle:      { status: 'Ready',        icon: '🎙️', label: 'TAP TO TALK',    hint: 'Hold to record · Release to send' },
  listening: { status: 'Listening...', icon: '🔴', label: 'RELEASE TO SEND', hint: 'Speak your command clearly'       },
  thinking:  { status: 'Thinking...',  icon: '⚙️', label: 'WORKING...',      hint: 'SiteBot is processing...'        },
  speaking:  { status: 'Speaking...',  icon: '🔊', label: 'WAIT...',         hint: 'Playing response'                },
  success:   { status: 'Done ✓',       icon: '✅', label: 'TAP TO TALK',    hint: 'Hold to record · Release to send' },
  error:     { status: 'Error',        icon: '⚠️', label: 'TRY AGAIN',      hint: 'Something went wrong'            },
};

const EYES = {
  idle:      { ry: 10, fill: '#3FA9F5' },
  listening: { ry: 13, fill: '#3FA9F5' },
  thinking:  { ry: 4,  fill: '#3FA9F5' },
  speaking:  { ry: 11, fill: '#3FA9F5' },
  success:   { ry: 4,  fill: '#22c55e' },
  error:     { ry: 7,  fill: '#ef4444' },
};

const SMILES = {
  idle:      'M78 153 Q100 165 122 153',
  listening: 'M78 155 Q100 170 122 155',
  thinking:  'M80 160 Q100 155 120 160',
  speaking:  'M78 155 Q100 170 122 155',
  success:   'M72 153 Q100 174 128 153',
  error:     'M80 162 Q100 152 120 162',
};

let currentState = 'idle';

function setState(state, message) {
  currentState = state;
  const s = STATES[state] || STATES.idle;
  app.className = `app state-${state}`;
  statusText.textContent = s.status;
  btnIcon.textContent = s.icon;
  btnLabel.textContent = s.label;
  holdHint.textContent = s.hint;
  if (message !== undefined) responseText.textContent = message;
  else if (state === 'idle') responseText.textContent = '';

  const cfg = EYES[state] || EYES.idle;
  document.getElementById('eyeL').setAttribute('ry', cfg.ry);
  document.getElementById('eyeR').setAttribute('ry', cfg.ry);
  document.getElementById('eyeL').setAttribute('fill', cfg.fill);
  document.getElementById('eyeR').setAttribute('fill', cfg.fill);
  document.getElementById('smilePath').setAttribute('d', SMILES[state] || SMILES.idle);
}

// ── AUDIO ──
let mediaRecorder, audioChunks = [], isRecording = false, stream;

async function getStream() {
  if (stream) return stream;
  stream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 16000 }
  });
  return stream;
}

async function startRecording() {
  if (isRecording || currentState === 'thinking' || currentState === 'speaking') return;
  try {
    audioChunks = [];
    mediaRecorder = new MediaRecorder(await getStream(), { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(100);
    isRecording = true;
    setState('listening');
  } catch {
    setState('error', 'Mic access denied. Allow microphone in settings.');
  }
}

async function stopAndSend() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  return new Promise(resolve => {
    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      if (blob.size < 1000) { setState('idle'); resolve(); return; }
      setState('thinking');
      try {
        const fd = new FormData();
        fd.append('audio', blob, 'command.webm');

        // Always send tenant_id and session_id as query params
        let webhookUrl = N8N_WEBHOOK_URL + '?tenant_id=' + encodeURIComponent(TENANT_ID);
        if (currentSessionId) {
          webhookUrl += '&session_id=' + encodeURIComponent(currentSessionId);
          console.log('Sending with session_id:', currentSessionId);
        } else {
          console.log('No session_id — new session');
        }

        const res = await fetch(webhookUrl, { method: 'POST', body: fd });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        console.log('Response:', JSON.stringify(data));

        // Handle blocked
        if (data.blocked) {
          setState('error', data.message);
          speak(data.tts_text, () => setTimeout(() => setState('idle'), 3000));
          resolve();
          return;
        }

        // Always store session_id if returned — keep it alive across presses
        if (data.session_id) {
          currentSessionId = data.session_id;
          console.log('Session stored:', currentSessionId);
        }

        const msg = data.message || 'Done.';
        setState('speaking', msg);

        speak(data.tts_text || msg, () => {
          // Detect follow-up: agent asked a question (ends with ?)
          const isFollowUp = data.task_complete === false || 
                             (msg.trim().endsWith('?'));

          if (isFollowUp) {
            // Keep session alive — agent needs more info
            // Auto re-enable mic after 800ms
            setState('idle', msg);
            setTimeout(() => {
              if (currentState === 'idle') startRecording();
            }, 800);
          } else {
            // Task complete — clear session for next fresh task
            console.log('Task complete — clearing session');
            currentSessionId = null;
            setState('success', msg);
            setTimeout(() => setState('idle'), 3500);
          }
        });

      } catch (err) {
        console.error('Error:', err);
        setState('error', 'Failed to reach SiteCommand. Check connection.');
        setTimeout(() => setState('idle'), 3000);
      }
      resolve();
    };
    mediaRecorder.stop();
  });
}

function speak(text, onEnd) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-GB';
    u.rate = 1.05;
    u.onend = onEnd;
    speechSynthesis.speak(u);
  } else {
    setTimeout(onEnd, 2000);
  }
}

// ── BUTTON EVENTS ──
const onPress = e => { e.preventDefault(); startRecording(); };
const onRelease = e => { e.preventDefault(); if (isRecording) stopAndSend(); };

pttBtn.addEventListener('touchstart', onPress, { passive: false });
pttBtn.addEventListener('touchend', onRelease, { passive: false });
pttBtn.addEventListener('touchcancel', onRelease, { passive: false });
pttBtn.addEventListener('mousedown', onPress);
pttBtn.addEventListener('mouseup', onRelease);
pttBtn.addEventListener('mouseleave', e => { if (isRecording) onRelease(e); });

// ── OUKITEL RT3 HARDWARE BUTTON ──
const HW_KEYS = new Set(['F13', 'F14', 'F15', 'F16', 'AudioVolumeUp', 'MediaTrackNext', 'MediaTrackPrevious']);
const HW_CODES = new Set([301, 302, 303, 304, 305, 306]);

document.addEventListener('keydown', e => {
  if (HW_KEYS.has(e.key) || HW_CODES.has(e.keyCode)) {
    e.preventDefault();
    startRecording();
  }
});

document.addEventListener('keyup', e => {
  if (HW_KEYS.has(e.key) || HW_CODES.has(e.keyCode)) {
    e.preventDefault();
    if (isRecording) stopAndSend();
  }
});

// ── INIT ──
window.addEventListener('load', async () => {
  try { await getStream(); } catch (_) {}
  setState('idle');
});

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(console.error);
  </script>
